version: '3.6'

services:
  db:
    image: postgres:14
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./${DUMP_DIR}:/tmp/dumps
      - ./${DUMP_DIR}/${DB_DUMP}:/docker-entrypoint-initdb.d/02dump.sql

  app:
    build: .
    restart: always
    ports:
      - "8080:8080"
    expose:
      - 8080
    container_name: app
    env_file:
      - .env
    depends_on:
      - db

volumes:
  pg_data:
